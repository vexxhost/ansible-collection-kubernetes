- hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install "jq" for log collection
      ansible.builtin.package:
        name: jq
        state: present
