---
- name: "DEPRECATED: cert_manager_image_cli — warn and remap to cert_manager_image_startupapicheck"
  ansible.builtin.debug:
    msg: >-
      [DEPRECATION WARNING] 'cert_manager_image_cli' is deprecated.
      Please switch to 'cert_manager_image_startupapicheck'. Support will be removed in a future version.
  when: cert_manager_image_cli is defined

- name: Remap deprecated cert_manager_image_cli to cert_manager_image_startupapicheck
  ansible.builtin.set_fact:
    cert_manager_image_startupapicheck: "{{ cert_manager_image_cli }}"
  when:
    - cert_manager_image_cli is defined
    - cert_manager_image_startupapicheck is not defined

- name: Deploy Helm chart
  run_once: true
  kubernetes.core.helm:
    name: "{{ cert_manager_helm_release_name }}"
    chart_ref: "{{ cert_manager_helm_chart_ref }}"
    release_namespace: "{{ cert_manager_helm_release_namespace }}"
    create_namespace: true
    kubeconfig: /etc/kubernetes/admin.conf
    values: "{{ _cert_manager_helm_values | combine(cert_manager_helm_values, recursive=True) }}"
