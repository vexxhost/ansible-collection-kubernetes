---
- name: Verify
  hosts: all
  become: true

  pre_tasks:
    - name: Gather service facts
      service_facts:

  tasks:
    - name: Make sure kubelet service is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['kubelet.service'].state in ['active', 'running']

    - name: Make sure kubelet service is enabled
      ansible.builtin.assert:
        that:
          - ansible_facts.services['kubelet.service'].status == 'enabled'

    - name: Get all nodes
      ansible.builtin.command: kubectl get nodes
      register: nodes
      failed_when:
        - nodes.rc != 0
        - not(nodes.stdout.find('instance') != -1)

    - name: Print node list
      ansible.builtin.debug:
        msg: "{{ nodes.stdout_lines }}"

    - name: Assert no nody is not ready
      ansible.builtin.assert:
        that:
          - nodes.stdout.find('NotReady') == -1

    - name: Wait for Envoy Gateway pods to be running
      ansible.builtin.command: kubectl get pods -n envoy-gateway-system -o jsonpath='{.items[*].status.phase}'
      register: envoy_gateway_pods
      retries: 30
      delay: 10
      until: "'Running' in envoy_gateway_pods.stdout"

    - name: Wait for GatewayClass to be accepted
      ansible.builtin.command: kubectl get gatewayclass eg -o jsonpath='{.status.conditions[?(@.type=="Accepted")].status}'
      register: envoy_gateway_gatewayclass
      retries: 30
      delay: 10
      until: envoy_gateway_gatewayclass.stdout == 'True'
